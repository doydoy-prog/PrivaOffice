<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataBee | מסמך הגדרות מאגר מידע</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0A1F3D;
  --navy-light: #1a3a5f;
  --navy-lighter: #2d5280;
  --gold: #D4A94A;
  --gold-bright: #E8BF5E;
  --gold-dark: #A88536;
  --bg: #F7F5EF;
  --bg-card: #FFFFFF;
  --text: #0A1F3D;
  --text-muted: #5a6b85;
  --text-soft: #8a97ab;
  --border: #E5E0D0;
  --success: #2d8659;
  --success-bg: #E5F0EA;
  --warning: #C77700;
  --warning-bg: #FFF2DD;
  --danger: #A83232;
  --danger-bg: #FBEAEA;
  --shadow: 0 4px 20px rgba(10, 31, 61, 0.08);
  --shadow-lg: 0 12px 40px rgba(10, 31, 61, 0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Heebo', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
  background: var(--navy);
  color: white;
  padding: 14px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.logo-mark {
  width: 32px;
  height: 32px;
  background: var(--gold);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: var(--navy);
  font-size: 18px;
}

.logo-mark::before {
  content: '';
  position: absolute;
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, transparent 45%, rgba(255,255,255,0.3) 50%, transparent 55%);
  border-radius: 8px;
}

.header-nav {
  display: flex;
  gap: 28px;
  font-size: 14px;
  color: rgba(255,255,255,0.7);
}

.header-nav a {
  color: inherit;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
}

.header-nav a:hover, .header-nav a.active { color: var(--gold); }

.user-chip {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 14px 6px 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 24px;
  font-size: 13px;
}

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--gold);
  color: var(--navy);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
}

/* ===== LAYOUT ===== */
.layout {
  display: grid;
  grid-template-columns: 1fr 420px;
  gap: 0;
  min-height: calc(100vh - 62px);
}

@media (max-width: 980px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

/* ===== MAIN (CHAT) ===== */
.main {
  padding: 40px 48px 80px;
  max-width: 780px;
  margin: 0 auto;
  width: 100%;
}

.progress-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.progress-track {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold));
  border-radius: 3px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  width: 0%;
}

.progress-label {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
  min-width: 90px;
  text-align: left;
}

.progress-label strong { color: var(--navy); font-weight: 700; }

/* ===== MESSAGES ===== */
.messages {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.message {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 15px;
}

.msg-avatar.bot {
  background: var(--navy);
  color: var(--gold);
}

.msg-avatar.user {
  background: var(--gold);
  color: var(--navy);
  font-size: 13px;
}

.msg-body {
  flex: 1;
  padding-top: 6px;
}

.msg-bubble {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 22px;
  font-size: 15.5px;
  line-height: 1.65;
  color: var(--text);
  box-shadow: var(--shadow);
}

.msg-bubble.user {
  background: var(--navy);
  color: white;
  border-color: var(--navy);
}

.msg-bubble strong { color: var(--navy); font-weight: 600; }
.msg-bubble.user strong { color: var(--gold); }

.msg-bubble .legal-ref {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 10px;
  padding: 4px 10px;
  background: rgba(212, 169, 74, 0.12);
  border: 1px solid rgba(212, 169, 74, 0.3);
  border-radius: 12px;
  font-size: 12px;
  color: var(--gold-dark);
  font-weight: 500;
}

.msg-bubble .legal-ref::before {
  content: '§';
  font-weight: 700;
  font-size: 13px;
}

/* ===== EXAMPLE / HELP CARD ===== */
.help-card {
  margin-top: 14px;
  padding: 14px 18px;
  background: linear-gradient(135deg, #fbf7ec 0%, #f5ecd6 100%);
  border: 1px solid rgba(212, 169, 74, 0.35);
  border-radius: 10px;
  font-size: 13.5px;
  color: var(--navy);
  line-height: 1.6;
}

.help-card-title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;
  color: var(--gold-dark);
  margin-bottom: 8px;
  font-size: 12.5px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

.help-card-title svg { width: 14px; height: 14px; }

.help-examples {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.help-example-chip {
  padding: 4px 10px;
  background: white;
  border: 1px solid rgba(212, 169, 74, 0.4);
  border-radius: 16px;
  font-size: 12px;
  color: var(--navy-light);
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}

.help-example-chip:hover {
  background: var(--gold);
  color: var(--navy);
  border-color: var(--gold);
  transform: translateY(-1px);
}

/* ===== INPUT AREA ===== */
.input-area {
  margin-top: 22px;
  padding-right: 54px;
}

.input-group { display: flex; flex-direction: column; gap: 12px; }

.text-input, .textarea-input {
  width: 100%;
  padding: 14px 18px;
  font-size: 15px;
  font-family: inherit;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: var(--bg-card);
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: none;
  direction: rtl;
}

.textarea-input { min-height: 90px; line-height: 1.5; }

.text-input:focus, .textarea-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 4px rgba(212, 169, 74, 0.15);
}

.option-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.option-btn {
  padding: 14px 16px;
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 12px;
  font-family: inherit;
  font-size: 14.5px;
  color: var(--text);
  cursor: pointer;
  text-align: right;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.option-btn:hover {
  border-color: var(--gold);
  background: #FFFBF2;
  transform: translateY(-1px);
}

.option-btn.selected {
  border-color: var(--navy);
  background: var(--navy);
  color: white;
}

.option-btn.selected .option-icon { color: var(--gold); }

.option-icon {
  width: 24px;
  height: 24px;
  color: var(--gold-dark);
  flex-shrink: 0;
}

.multi-select-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 8px;
}

.checkbox-card {
  padding: 12px 14px;
  background: var(--bg-card);
  border: 2px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  user-select: none;
}

.checkbox-card:hover {
  border-color: var(--gold);
  background: #FFFBF2;
}

.checkbox-card.checked {
  border-color: var(--navy);
  background: #F0F4FA;
}

.checkbox-card.sensitive.checked {
  border-color: var(--gold-dark);
  background: #fbf3e2;
}

.checkbox-indicator {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-radius: 5px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}

.checkbox-card.checked .checkbox-indicator {
  background: var(--navy);
  border-color: var(--navy);
}

.checkbox-card.sensitive.checked .checkbox-indicator {
  background: var(--gold-dark);
  border-color: var(--gold-dark);
}

.checkbox-indicator svg {
  width: 12px;
  height: 12px;
  color: white;
  opacity: 0;
  transition: opacity 0.15s;
}

.checkbox-card.checked .checkbox-indicator svg { opacity: 1; }

.sensitive-badge {
  display: inline-block;
  padding: 2px 6px;
  background: rgba(212, 169, 74, 0.2);
  color: var(--gold-dark);
  font-size: 10px;
  font-weight: 600;
  border-radius: 4px;
  margin-right: 6px;
}

/* NUMBER slider */
.number-slider-wrap { padding: 8px 4px; }

.number-display {
  text-align: center;
  margin-bottom: 20px;
}

.number-value {
  font-size: 42px;
  font-weight: 800;
  color: var(--navy);
  letter-spacing: -1px;
}

.number-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
}

.number-input-group {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.number-input-group input[type="number"] {
  flex: 0 0 140px;
  text-align: center;
  font-weight: 600;
}

.number-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.preset-chip {
  padding: 6px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  font-size: 12.5px;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
}

.preset-chip:hover {
  border-color: var(--gold);
  color: var(--navy);
}

/* ===== VENDOR ROWS ===== */
.vendor-list { display: flex; flex-direction: column; gap: 10px; }

.vendor-row {
  padding: 14px;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr auto;
  gap: 10px;
  align-items: center;
}

.vendor-row input {
  padding: 8px 12px;
  font-size: 13.5px;
  border: 1px solid var(--border);
  border-radius: 7px;
  font-family: inherit;
}

.vendor-row input:focus { outline: none; border-color: var(--gold); }

.vendor-remove {
  background: transparent;
  border: none;
  color: var(--danger);
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.vendor-remove:hover { background: var(--danger-bg); }

.add-vendor-btn {
  padding: 10px;
  background: transparent;
  border: 1.5px dashed var(--border);
  border-radius: 10px;
  color: var(--text-muted);
  cursor: pointer;
  font-family: inherit;
  font-size: 13.5px;
  transition: all 0.15s;
}

.add-vendor-btn:hover { border-color: var(--gold); color: var(--navy); background: #FFFBF2; }

/* ===== ACTION BUTTONS ===== */
.action-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  gap: 12px;
}

.btn {
  padding: 12px 28px;
  border-radius: 10px;
  font-family: inherit;
  font-size: 14.5px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-primary {
  background: var(--navy);
  color: var(--gold);
}

.btn-primary:hover { background: var(--navy-light); transform: translateY(-1px); }

.btn-primary:disabled {
  background: var(--border);
  color: var(--text-soft);
  cursor: not-allowed;
  transform: none;
}

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
}

.btn-ghost:hover { color: var(--navy); border-color: var(--navy); }

/* TYPING indicator */
.typing {
  display: inline-flex;
  gap: 4px;
  padding: 14px 18px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
}

.typing-dot {
  width: 8px;
  height: 8px;
  background: var(--text-soft);
  border-radius: 50%;
  animation: typing 1.4s infinite ease-in-out;
}

.typing-dot:nth-child(1) { animation-delay: 0s; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ===== SIDEBAR DASHBOARD ===== */
.sidebar {
  background: var(--navy);
  color: white;
  padding: 28px 24px;
  overflow-y: auto;
  position: sticky;
  top: 62px;
  height: calc(100vh - 62px);
  border-right: 1px solid rgba(255,255,255,0.08);
}

.sidebar-header { margin-bottom: 24px; }

.sidebar-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 1.8px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.sidebar-subtitle {
  font-size: 18px;
  font-weight: 700;
  color: white;
  line-height: 1.3;
}

.db-card {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 16px 18px;
  margin-bottom: 14px;
  transition: all 0.3s;
}

.db-card.highlight {
  background: rgba(212, 169, 74, 0.08);
  border-color: rgba(212, 169, 74, 0.35);
  animation: pulse 1.2s ease;
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(212, 169, 74, 0.5); }
  70% { box-shadow: 0 0 0 12px rgba(212, 169, 74, 0); }
  100% { box-shadow: 0 0 0 0 rgba(212, 169, 74, 0); }
}

.db-card-label {
  font-size: 11px;
  color: var(--gold);
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  text-transform: uppercase;
}

.db-card-value {
  font-size: 18px;
  font-weight: 700;
  color: white;
  line-height: 1.3;
}

.db-card-value.empty { color: var(--text-soft); font-style: italic; font-weight: 400; font-size: 14px; }

.db-card-detail {
  font-size: 12.5px;
  color: rgba(255,255,255,0.65);
  margin-top: 4px;
  line-height: 1.5;
}

.security-level-card {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-bright) 100%);
  color: var(--navy);
  border: none;
  padding: 18px 20px;
}

.security-level-card .db-card-label { color: var(--navy); opacity: 0.75; }
.security-level-card .db-card-value { color: var(--navy); font-size: 20px; }
.security-level-card .db-card-detail { color: var(--navy); opacity: 0.8; }

.completion-ring {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
  padding: 14px 16px;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
}

.ring-svg { width: 56px; height: 56px; transform: rotate(-90deg); }

.ring-bg { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 5; }

.ring-fill {
  fill: none;
  stroke: var(--gold);
  stroke-width: 5;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.ring-text {
  font-size: 20px;
  font-weight: 700;
  fill: white;
  text-anchor: middle;
  dominant-baseline: central;
  transform: rotate(90deg);
  transform-origin: center;
}

.ring-info { flex: 1; }
.ring-info-title { font-size: 14px; font-weight: 600; color: white; margin-bottom: 2px; }
.ring-info-sub { font-size: 12px; color: rgba(255,255,255,0.6); }

.sensitive-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--gold);
  color: var(--navy);
  border-radius: 12px;
  font-size: 11.5px;
  font-weight: 700;
  margin-top: 6px;
}

/* ===== RESULT SCREEN ===== */
.result-hero {
  text-align: center;
  padding: 40px 20px;
  margin-bottom: 28px;
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  color: white;
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}

.result-hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, rgba(212, 169, 74, 0.25) 0%, transparent 70%);
  pointer-events: none;
}

.result-hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: rgba(212, 169, 74, 0.2);
  border: 1px solid var(--gold);
  border-radius: 20px;
  color: var(--gold);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-bottom: 18px;
  position: relative;
  z-index: 1;
}

.result-hero-title {
  font-size: 30px;
  font-weight: 800;
  margin-bottom: 10px;
  position: relative;
  z-index: 1;
}

.result-hero-subtitle {
  font-size: 15px;
  color: rgba(255,255,255,0.75);
  position: relative;
  z-index: 1;
  line-height: 1.6;
  max-width: 560px;
  margin: 0 auto;
}

.section-block {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px 26px;
  margin-bottom: 18px;
  box-shadow: var(--shadow);
}

.section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.section-title-icon {
  width: 32px;
  height: 32px;
  background: var(--navy);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--gold);
}

.classification-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.class-card {
  padding: 16px 18px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
}

.class-card.active {
  background: linear-gradient(135deg, #fbf3e2 0%, #f5ecd0 100%);
  border-color: var(--gold);
}

.class-card.active-navy {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  border-color: var(--navy);
  color: white;
}

.class-card-label {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.class-card.active-navy .class-card-label { color: var(--gold); }
.class-card.active .class-card-label { color: var(--gold-dark); }

.class-card-value {
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}

.class-card.active-navy .class-card-value { color: white; }

.class-card-detail {
  font-size: 12.5px;
  color: var(--text-muted);
  line-height: 1.5;
}

/* SENSITIVE-DATA tile */
.sensitive-tile {

<script>
// ============== STATE ==============

// ============== STEPS (the questionnaire flow) ==============
const steps = [
  {
    id: 'welcome',
    bot: `<strong>שלום! 👋</strong> אני עמית, היועץ הדיגיטלי שלך מ-DataBee.<br><br>

          אל תדאג - אני אסביר כל שאלה בשפה פשוטה, ובמקביל אעדכן את המסמך והדשבורד שלך בצד.`,

  {
    id: 'dbName',

    help: {
      title: 'דוגמאות לשמות מאגרים',
      text: 'השם צריך לשקף את המטרה או הקהל של המאגר.',
      examples: ['עובדים וספקים', 'לקוחות ומתעניינים', 'חברי קהילה ותורמים', 'משתתפי אירועים'],
    },
    input: 'text',
    placeholder: 'לדוגמה: אוהדים ומתעניינים',
    field: 'dbName',
    validate: v => v.length >= 2,
    onAnswer: v => `המאגר ייקרא <strong>"${v}"</strong>`,
  },
  {
    id: 'purpose',
    bot: `<strong>למה משמש המאגר הזה?</strong><br><br>
          זה נקרא "מטרת השימוש במידע" והיא קריטית - לפי <strong>עקרון צמידות המטרה</strong>, מותר להשתמש במידע רק למטרות שנקבעו.<br>
          תאר במשפט-שניים: מה אתם עושים עם המידע הזה?`,
    legalRef: 'סעיף 2(9) לחוק + תקנה 2(א)(2)',
    help: {
      title: 'למה זה חשוב?',
      text: 'כשנושא מידע נתן לך את הפרטים שלו, הוא הסכים שתשתמש בהם למטרה מסוימת. שימוש במידע למטרה אחרת (למשל - איסוף לצורך הרשמה ושימוש לצרכי שיווק) בלי הסכמה נוספת הוא פגיעה בפרטיות.',
      examples: ['דיוור ישיר ושיווק', 'ניהול העמותה וחברים', 'מחקר וסטטיסטיקה', 'גיוס תרומות'],

    input: 'textarea',
    placeholder: 'לדוגמה: שליחת תוכן שיווקי, ניהול אירועים, גיוס תומכים חדשים',

  {
    id: 'collectionMethod',
    bot: `<strong>איך אספתם את המידע במאגר?</strong><br><br>

    legalRef: 'סעיפים 11-12 לחוק הגנת הפרטיות',
    input: 'options',
    field: 'collectionMethod',
    options: [
      { value: 'direct', label: 'ישירות מנושאי המידע (טפסי הרשמה, טפסים מקוונים)', icon: 'user' },
      { value: 'thirdParty', label: 'מצדדים שלישיים (שותפים, רשימות שיווק)', icon: 'users' },
      { value: 'mixed', label: 'שילוב של השניים', icon: 'shuffle' },
    ],
    onAnswer: v => {
      const labels = { direct: 'ישירות מנושאי המידע', thirdParty: 'מצדדים שלישיים', mixed: 'שילוב של שני המקורות' };
      return `המידע נאסף <strong>${labels[v]}</strong>`;

  {
    id: 'subjectsCount',
    bot: `<strong>כמה אנשים (נושאי מידע) יש במאגר?</strong><br><br>
          זה מספר שקריטי לקביעת רמת האבטחה: מאגרים עם מעל <strong>100,000</strong> אנשים חייבים ברמת אבטחה גבוהה לפי התקנות.`,

  {

    legalRef: 'תקנה 1 + תקנה 8',
    help: {

      text: 'כל אדם שיש לו סיסמה או הרשאה לגשת למאגר - עובדים, מנהלים, אנשי IT, ספקים חיצוניים עם גישה.',
    },
    input: 'number',
    field: 'permissionsCount',
    placeholder: '10',
    presets: [1, 5, 10, 25, 100, 250],
    validate: v => v > 0,
    onAnswer: v => `יש <strong>${v}</strong> מורשי גישה`,
  },
  {
    id: 'dataTypes',
    bot: `<strong>איזה סוגי מידע יש במאגר?</strong><br><br>
          סמן את כל סוגי המידע שאתם שומרים. שים לב - <strong>סוגי מידע בסימון זהב הם "מידע בעל רגישות מיוחדת"</strong> לפי סעיף 1(3) לתוספת הראשונה, ומשדרגים אוטומטית את רמת האבטחה.`,
    legalRef: 'תוספת ראשונה, פרט 1(3) לחוק',
    input: 'multiSelect',
    field: 'dataTypes',
    options: [
      { value: 'identity', label: 'פרטי זיהוי (שם, ת"ז)', sensitive: false },
      { value: 'contact', label: 'פרטי קשר (טלפון, כתובת, מייל)', sensitive: false },
      { value: 'demographic', label: 'דמוגרפיה (גיל, מגדר)', sensitive: false },
      { value: 'occupation', label: 'תחום עיסוק/תפקיד', sensitive: false },
      { value: 'behavioral', label: 'מידע התנהגותי (השתתפות באירועים)', sensitive: false },
      { value: 'medical', label: 'מידע רפואי או נפשי', sensitive: true },
      { value: 'political', label: 'דעות פוליטיות', sensitive: true },
      { value: 'religious', label: 'אמונות דתיות או השקפת עולם', sensitive: true },
      { value: 'sexual', label: 'מידע על צנעת חייו האישיים', sensitive: true },
      { value: 'criminal', label: 'עבר פלילי', sensitive: true },
      { value: 'biometric', label: 'מידע ביומטרי (שאינו תמונת פנים)', sensitive: true },
      { value: 'financial', label: 'מידע על נכסים ומצב כלכלי', sensitive: true },
      { value: 'genetic', label: 'מידע גנטי', sensitive: true },
      { value: 'consumption', label: 'הרגלי צריכה', sensitive: true },
    ],
    validate: v => Array.isArray(v) && v.length > 0,
    onAnswer: v => `נבחרו <strong>${v.length}</strong> סוגי מידע`,
  },
  {
    id: 'transferAbroad',

          זה כולל גם אחסון בענן של חברות זרות (Google, AWS, Azure, Monday.com). רוב הארגונים כן - זה מחייב בסיס משפטי לפי תקנות העברת מידע לחו"ל.`,
    legalRef: 'תקנות הגנת הפרטיות (העברת מידע לחו"ל), תשס"א-2001',

      title: 'דוגמאות נפוצות',
      examples: ['Google Workspace (Gmail, Drive)', 'Monday.com', 'ActiveTrail', 'Salesforce', 'AWS / Azure'],
    },
    input: 'options',
    field: 'transferAbroad',

      { value: true, label: 'כן - יש העברה או אחסון בחו"ל', icon: 'globe' },

  },

    id: 'vendors',

    legalRef: 'תקנה 15',

  },

// ============== RENDER ==============
const messagesEl = document.getElementById('messages');
const progressFillEl = document.getElementById('progressFill');
const progressStepEl = document.getElementById('progressStep');
const progressTotalEl = document.getElementById('progressTotal');
const ringFillEl = document.getElementById('ringFill');
const ringTextEl = document.getElementById('ringText');
const ringSubEl = document.getElementById('ringSub');

progressTotalEl.textContent = steps.length;

function scrollToBottom() {
  requestAnimationFrame(() => {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  });
}

function typingIndicator() {
  const el = document.createElement('div');
  el.className = 'message';
  el.innerHTML = `
    <div class="msg-avatar bot">ע</div>
    <div class="msg-body"><div class="typing"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div>`;
  return el;
}

function botMessage(step) {
  const el = document.createElement('div');
  el.className = 'message';
  el.dataset.stepId = step.id;

  const helpHtml = step.help ? renderHelpCard(step.help) : '';
  const legalHtml = step.legalRef
    ? `<div class="legal-ref">${step.legalRef}</div>` : '';

  el.innerHTML = `
    <div class="msg-avatar bot">ע</div>
    <div class="msg-body">
      <div class="msg-bubble">${step.bot}${legalHtml}</div>
      ${helpHtml}
      <div class="input-area" id="input-${step.id}"></div>
    </div>`;
  return el;
}

function renderHelpCard(help) {
  let chipsHtml = '';
  if (help.examples) {
    chipsHtml = `<div class="help-examples">${help.examples.map(ex =>
      `<span class="help-example-chip" onclick="useExample('${ex.replace(/'/g, "\\'")}')">${ex}</span>`
    ).join('')}</div>`;
  }
  return `
    <div class="help-card">
      <div class="help-card-title">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        ${help.title}
      </div>
      ${help.text ? `<div>${help.text}</div>` : ''}
      ${chipsHtml}
    </div>`;
}

function userMessage(text) {
  const el = document.createElement('div');
  el.className = 'message';
  el.innerHTML = `
    <div class="msg-avatar user">אח</div>
    <div class="msg-body"><div class="msg-bubble user">${text}</div></div>`;
  return el;
}

function useExample(text) {
  const activeInput = document.querySelector('.text-input:not([disabled]), .textarea-input:not([disabled])');
  if (activeInput) {
    activeInput.value = text;
    activeInput.focus();
    activeInput.dispatchEvent(new Event('input'));
  }
}

// ============== INPUT RENDERERS ==============
function renderInput(step) {
  const inputEl = document.getElementById(`input-${step.id}`);
  if (!inputEl) return;

  switch (step.input) {
    case 'continue': return renderContinue(inputEl, step);
    case 'text': return renderText(inputEl, step, 'input');
    case 'textarea': return renderText(inputEl, step, 'textarea');
    case 'number': return renderNumber(inputEl, step);
    case 'options': return renderOptions(inputEl, step);
    case 'multiSelect': return renderMultiSelect(inputEl, step);
    case 'vendors': return renderVendors(inputEl, step);

// ============== SUBMIT / PROGRESS ==============
function handleSubmit(value) {
  const step = steps[state.currentStep];

  // Save answer
  if (step.field) state.answers[step.field] = value;

  // Remove active input area
  const inputArea = document.getElementById(`input-${step.id}`);
  if (inputArea) inputArea.innerHTML = '';

  // Show user message
  if (step.onAnswer && step.id !== 'welcome') {
    const userText = typeof step.onAnswer === 'function' ? step.onAnswer(value, state) : '';
    if (userText) messagesEl.appendChild(userMessage(userText));
  }

  // Update live dashboard
  updateLiveDashboard();

  // Advance
  state.currentStep++;
  updateProgress();

  if (state.currentStep < steps.length) {
    showNextStep();
  } else {
    showFinalResult();
  }

  scrollToBottom();
}

function updateProgress() {
  const pct = (state.currentStep / steps.length) * 100;
  progressFillEl.style.width = `${pct}%`;
  progressStepEl.textContent = Math.min(state.currentStep + 1, steps.length);
  const circ = 2 * Math.PI * 25;
  const offset = circ - (pct / 100) * circ;
  ringFillEl.style.strokeDashoffset = offset;
  ringTextEl.textContent = `${Math.round(pct)}%`;

  if (pct < 25) ringSubEl.textContent = 'בהתחלה - יש עוד הרבה לעשות';
  else if (pct < 50) ringSubEl.textContent = 'מתקדמים יפה';
  else if (pct < 75) ringSubEl.textContent = 'יותר מחצי!';
  else if (pct < 100) ringSubEl.textContent = 'כמעט בסיום';
  else ringSubEl.textContent = 'הושלם! 🎉';
}

function showNextStep() {
  const step = steps[state.currentStep];
  const typing = typingIndicator();
  messagesEl.appendChild(typing);
  scrollToBottom();

  setTimeout(() => {
    typing.remove();
    messagesEl.appendChild(botMessage(step));
    renderInput(step);
    scrollToBottom();
  }, 700);
}

  const a = state.answers;

  setCard('v-name', a.dbName, 'card-name');
  setCard('v-subjects', a.subjectsCount ? a.subjectsCount.toLocaleString() : null, 'card-subjects');

  if (a.subjectsCount) {

  setCard('v-permissions', a.permissionsCount ? `${a.permissionsCount} מורשים` : null, 'card-permissions');

  if (a.dataTypes && a.dataTypes.length) {
    const text = `${a.dataTypes.length} סוגים`;
    setCard('v-types', text, 'card-types');

    const pillWrap = document.getElementById('sensitive-pill-wrap');
    if (a.sensitiveTypes && a.sensitiveTypes.length) {
      pillWrap.innerHTML = `<span class="sensitive-pill">⚠ מידע רגישות מיוחדת × ${a.sensitiveTypes.length}</span>`;
    } else { pillWrap.innerHTML = ''; }

  if (a.transferAbroad !== null && a.transferAbroad !== undefined) {
    setCard('v-transfer', a.transferAbroad ? 'כן - לחו"ל' : 'לא - ישראל בלבד', 'card-transfer');

  if (a.vendors && a.vendors.length) {
    setCard('v-vendors', `${a.vendors.length} ספקים פעילים`, 'card-vendors');
  }

  // Security level calculation (once we have enough data)
  if (a.subjectsCount && a.permissionsCount && a.dataTypes && a.dataTypes.length) {

// ============== SECURITY LEVEL LOGIC ==============
// Based on the official Privacy Protection Authority guide
function calculateSecurityLevel(a) {
  const hasSensitive = a.sensitiveTypes && a.sensitiveTypes.length > 0;
  const subjects = a.subjectsCount || 0;
  const permissions = a.permissionsCount || 0;

  // HIGH: intermediate criteria + (100K+ subjects OR 100+ permissions)
  if (hasSensitive && (subjects >= 100000 || permissions > 100)) {
    return {
      level: 'גבוהה',
      levelKey: 'high',
      reason: 'מידע רגיש + (מעל 100K אנשים או מעל 100 מורשים)',
    };
  }

  // INTERMEDIATE: has sensitive data (unless employee-only edge case)
  if (hasSensitive) {
    // Edge case from law: if permissions ≤ 10 AND only certain types, drops to basic
    if (permissions <= 10 && onlyMildSensitive(a.sensitiveTypes)) {
      return {
        level: 'בסיסית',
        levelKey: 'basic',
        reason: 'חריג: פחות מ-10 מורשים ואין מידע רגיש חמור',
      };
    }
    return {
      level: 'בינונית',
      levelKey: 'medium',
      reason: 'מידע בעל רגישות מיוחדת - פחות מ-100K אנשים',
    };
  }

  return {
    level: 'בסיסית',
    levelKey: 'basic',
    reason: 'אין מידע בעל רגישות מיוחדת',
  };
}

function onlyMildSensitive(sensitiveTypes) {
  // Types that don't force intermediate level if restrictions apply
  const mildTypes = ['medical', 'criminal', 'financial'];
  return sensitiveTypes.every(t => mildTypes.includes(t));
}

          <div class="task-item">

            <div class="task-content">
              <div class="task-title">${t.title}</div>
              <div class="task-desc">${t.desc}</div>
              <div class="task-meta">
                <span class="task-badge badge-priority-${t.priority}">עדיפות ${t.priorityLabel}</span>
                <span class="task-badge badge-ref">${t.ref}</span>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;

  const resultEl = document.createElement('div');
  resultEl.innerHTML = `
    <div class="result-hero">
      <div class="result-hero-badge">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        המסמך הושלם בהצלחה
      </div>
      <div class="result-hero-title">מסמך הגדרות מאגר: ${a.dbName}</div>
      <div class="result-hero-subtitle">
        סיכמנו עבורך את הנתונים, סיווגנו את המאגר לפי חוק הגנת הפרטיות, וזיהינו את הצעדים הנדרשים להשלמת ההסדרה.
      </div>
    </div>
    ${classificationHtml}
    ${tasksHtml}

    <div class="section-block">
      <div class="section-title">
        <div class="section-title-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        יצוא המסמך
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="alert('בגרסה האמיתית: יצירת Word על בסיס תבנית התקנות')">
          הורד כ-Word (.docx)
        </button>
        <button class="btn btn-ghost" onclick="alert('בגרסה האמיתית: PDF עם חתימת DPO')">הורד כ-PDF</button>
        <button class="btn btn-ghost" onclick="alert('שולח ל-DPO לאישור')">שלח ל-DPO לאישור</button>
      </div>
    </div>`;

  messagesEl.appendChild(resultEl);

  // Also collapse sidebar into "all complete" state
  const sidebarTitle = document.querySelector('.sidebar-subtitle');
  sidebarTitle.textContent = 'המסמך שלך - מלא';

  scrollToBottom();
}

function renderSensitiveTile(a) {
  const labels = {
    medical: 'רפואי/נפשי', political: 'פוליטי', religious: 'דתי/השקפתי',
    sexual: 'צנעת חיים', criminal: 'עבר פלילי', biometric: 'ביומטרי',
    financial: 'כלכלי', genetic: 'גנטי', consumption: 'הרגלי צריכה',
  };
  const list = a.sensitiveTypes.map(t => labels[t] || t).join(', ');
  return `
    <div class="sensitive-tile">
      <div class="sensitive-icon">
        <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <div>
        <div class="sensitive-title">מידע בעל רגישות מיוחדת - טיפול מיוחד</div>
        <div class="sensitive-desc">זיהינו במאגר: ${list}. המשמעות: חובות אבטחה מוגברות, חובות יידוע מחמירות, ופיצוי ללא הוכחת נזק במקרה של הפרה.</div>
      </div>
    </div>`;
}

function hasCommercialExemption(a) {
  // After תיקון 13, registration required only for: public bodies, or commercial data trading/direct mail
  // For a typical organization - they're exempt
  return false;
}

function generateTasks(a, sec) {
  const tasks = [];
  const hasSensitive = a.sensitiveTypes && a.sensitiveTypes.length > 0;
  const secKey = sec.levelKey;

  // Task 1: Privacy policy (always)
  tasks.push({
    title: 'פרסום מדיניות פרטיות באתר ובנקודות איסוף',
    desc: 'ניסוח מדיניות פרטיות הכוללת מטרות האיסוף, זכויות נושאי המידע, וסוגי המידע הנאסף. יש להציג בבירור בכל נקודת איסוף.',
    priority: 'high', priorityLabel: 'גבוהה',
    ref: 'סעיף 11 לחוק',
  });

  // Task 2: Consent mechanisms
  tasks.push({
    title: 'הוספת מנגנוני הסכמה בטפסים',
    desc: 'הוספת צ\'קבוקס הסכמה נפרד למדיניות פרטיות ולדיוור ישיר בכל טפסי הרישום והפניה.',
    priority: 'high', priorityLabel: 'גבוהה',
    ref: 'סעיפים 11-12 לחוק',
  });

  // Task 3: DSR mechanism
  tasks.push({
    title: 'הקמת מנגנון מענה לפניות נושאי מידע',
    desc: 'פתיחת תיבת פניות ייעודית למימוש זכויות עיון, תיקון ומחיקה. קביעת נוהל מענה תוך 30 יום.',
    priority: 'medium', priorityLabel: 'בינונית',
    ref: 'סעיפים 13-14 + 17א',
  });

  // Task 4: Direct mail unsubscribe
  tasks.push({
    title: 'מנגנון הסרה אוטומטי מדיוור',
    desc: 'הוספת קישור הסרה בכל דיוור + ניהול רשימת הסרות ממוחשבת. חוסר עמידה = פיצוי של 1,000 ₪ ללא הוכחת נזק.',
    priority: 'medium', priorityLabel: 'בינונית',
    ref: 'סעיף 30א לחוק התקשורת',
  });

  // Task 5: Outsourcing - only if there are vendors
  if (a.vendors && a.vendors.length > 0) {
    tasks.push({
      title: `החתמת ${a.vendors.length} ספקים על הסכם מיקור חוץ (DPA)`,
      desc: 'כל ספק שמעבד מידע עבורכם חייב לחתום על הסכם לפי תקנה 15 המגדיר: סוג הגישה, משך ההתקשרות, חובות סודיות ואבטחה.',
      priority: 'high', priorityLabel: 'גבוהה',
      ref: 'תקנה 15',
    });
  }

  // Task 6: International transfer - only if relevant
  if (a.transferAbroad) {
    tasks.push({
      title: 'הסדרת העברת מידע לחו"ל',
      desc: 'תיעוד הבסיס המשפטי להעברת המידע (הסכמת נושא המידע + עמידה בדרישות התקנות להעברות לחו"ל).',
      priority: 'medium', priorityLabel: 'בינונית',
      ref: 'תקנות העברת מידע לחו"ל',
    });
  }

  // Task 7: Security procedure - based on security level
  if (secKey === 'medium' || secKey === 'high') {
    tasks.push({
      title: 'עריכת נוהל אבטחת מידע ארגוני',
      desc: `נוהל בהיקף המתאים לרמה ${sec.level}, הכולל: אבטחה פיזית, הרשאות גישה, זיהוי ואימות, ניהול התקנים ניידים, אירועי אבטחה, ביקורות תקופתיות וגיבויים.`,
      priority: 'high', priorityLabel: 'גבוהה',
      ref: 'תקנה 4',
    });

    tasks.push({
      title: 'הקמת מנגנון בקרה ותיעוד גישה (Logging)',
      desc: 'מנגנון אוטומטי שמתעד: זהות המשתמש, שעת גישה, רכיב המערכת, סוג הגישה. שמירה לפחות 24 חודשים.',
      priority: 'high', priorityLabel: 'גבוהה',
      ref: 'תקנה 10',
    });

    tasks.push({
      title: 'הדרכת מורשי גישה (אחת לשנתיים לפחות)',
      desc: 'הדרכה על חובות לפי חוק הגנת הפרטיות והתקנות. חובה לכל מורשה חדש לפני מתן הגישה.',
      priority: 'medium', priorityLabel: 'בינונית',
      ref: 'תקנה 7',
    });

    tasks.push({
      title: 'מיפוי מערכות המאגר',
      desc: 'תיעוד התשתיות, רכיבי התקשורת, תוכנות, וסכמת רשת של המאגר.',
      priority: 'medium', priorityLabel: 'בינונית',
      ref: 'תקנה 5',
    });
  }

  // Task: Penetration tests + risk survey (HIGH only)
  if (secKey === 'high') {
    tasks.push({
      title: 'סקר סיכונים ומבדקי חדירות',
      desc: 'אחת ל-18 חודשים לפחות - סקר סיכוני אבטחה ומבדקי חדירות למערכות המאגר.',
      priority: 'high', priorityLabel: 'גבוהה',
      ref: 'תקנה 5(ג)+(ד)',
    });
  }

  // Periodic audits (medium + high)
  if (secKey === 'medium' || secKey === 'high') {
    tasks.push({
      title: 'ביקורות תקופתיות (אחת ל-24 חודשים)',
      desc: 'ביקורת פנימית או חיצונית על ידי גורם מוסמך שאינו ממונה האבטחה.',
      priority: 'low', priorityLabel: 'נמוכה',
      ref: 'תקנה 16',
    });
  }

  // Task: Annual review
  tasks.push({
    title: 'בחינה שנתית של היקף המידע',
    desc: 'פעם בשנה - בחינה האם היקף וסוגי המידע אינם עולים על הנדרש. מחיקה/אנונימיזציה של מידע עודף.',
    priority: 'low', priorityLabel: 'נמוכה',
    ref: 'תקנה 2(ג)',
  });

  // Task: DPO appointment (if sensitive data on many people)
  if (hasSensitive && a.subjectsCount > 10000) {
    tasks.push({
      title: 'מינוי ממונה על הגנת הפרטיות (DPO)',
      desc: 'ארגון עם מידע בעל רגישות מיוחדת בהיקף ניכר - חובה למנות DPO. עורך דין מוסמך מצוות DataBee יוכל לשמש בתפקיד.',
      priority: 'medium', priorityLabel: 'בינונית',
      ref: 'תיקון 13 לחוק',
    });
  }

  return tasks;
}

// ============== INIT ==============
function init() {
  // Render first step
  const firstStep = steps[0];
  messagesEl.appendChild(botMessage(firstStep));
  renderInput(firstStep);
  updateProgress();
}

init();
</script>
