<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataBee | פלטפורמת הסדרת פרטיות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0A1F3D;--navy-l:#1a3a5f;--navy-ll:#2d5280;--gold:#D4A94A;--gold-b:#E8BF5E;--gold-d:#A88536;--bg:#F7F5EF;--bg-c:#FFF;--tx:#0A1F3D;--tx-m:#5a6b85;--tx-s:#8a97ab;--bd:#E5E0D0;--ok:#2d8659;--ok-bg:#E5F0EA;--warn:#C77700;--warn-bg:#FFF2DD;--err:#A83232;--err-bg:#FBEAEA;--sh:0 4px 20px rgba(10,31,61,.08);--sh-lg:0 12px 40px rgba(10,31,61,.15)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Heebo',-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

.hdr{background:var(--navy);color:#fff;padding:12px 28px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.logo{display:flex;align-items:center;gap:10px;font-size:19px;font-weight:700;cursor:pointer}.logo-m{width:30px;height:30px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--navy);font-size:16px}
.hdr-center{display:flex;align-items:center;gap:14px}
.client-sel{position:relative}.client-btn{display:flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:10px;color:#fff;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;min-width:160px}.client-btn:hover{background:rgba(255,255,255,.12)}
.client-btn .avt{width:24px;height:24px;font-size:11px}.client-btn svg{margin-right:auto;width:14px;height:14px;opacity:.5}
.client-dd{position:absolute;top:calc(100% + 6px);right:0;width:300px;background:#fff;border:1px solid var(--bd);border-radius:12px;box-shadow:var(--sh-lg);z-index:200;display:none;overflow:hidden;max-height:400px;overflow-y:auto}.client-dd.open{display:block}
.client-dd-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:.1s;font-size:13.5px;color:var(--tx);border-bottom:1px solid var(--bd)}.client-dd-item:last-child{border-bottom:none}.client-dd-item:hover{background:var(--bg)}.client-dd-item.active{background:rgba(212,169,74,.1);font-weight:600}
.client-dd-item .avt{width:28px;height:28px;font-size:12px}.client-dd-add{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;color:var(--gold-d);font-weight:600;font-size:13px;background:rgba(212,169,74,.06)}.client-dd-add:hover{background:rgba(212,169,74,.12)}
.avt{width:28px;height:28px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.hdr-nav{display:flex;gap:6px}.hdr-nav a{color:rgba(255,255,255,.6);text-decoration:none;padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s}.hdr-nav a:hover{color:#fff;background:rgba(255,255,255,.07)}.hdr-nav a.active{color:var(--gold);background:rgba(212,169,74,.1)}
@media(max-width:768px){.hdr-nav{display:none}.hdr{padding:10px 14px}}

#app{min-height:calc(100vh - 56px)}

/* Welcome + New Client */
.welcome{max-width:640px;margin:60px auto;padding:0 20px;text-align:center}.welcome h1{font-size:28px;font-weight:800;color:var(--navy);margin-bottom:10px}.welcome p{font-size:15px;color:var(--tx-m);line-height:1.7;margin-bottom:30px}
.card{background:var(--bg-c);border:1.5px solid var(--bd);border-radius:16px;padding:32px;box-shadow:var(--sh);text-align:right}.card h2{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:20px}
.form-row{margin-bottom:16px}.form-label{display:block;font-size:13px;font-weight:600;color:var(--tx-m);margin-bottom:6px}
.form-input{width:100%;padding:12px 16px;font-size:14.5px;font-family:inherit;border:2px solid var(--bd);border-radius:10px;background:var(--bg-c);color:var(--tx);transition:.2s}.form-input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 4px rgba(212,169,74,.15)}
.form-select{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%235a6b85' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:left 14px center;padding-left:36px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:500px){.form-row-2{grid-template-columns:1fr}}

/* Dashboard */
.dash{padding:32px 40px 60px;max-width:1200px;margin:0 auto}@media(max-width:600px){.dash{padding:20px 16px}}
.dash-hero{background:linear-gradient(135deg,var(--navy),var(--navy-l));border-radius:18px;padding:32px 36px;color:#fff;position:relative;overflow:hidden;margin-bottom:28px}
.dash-hero::after{content:'';position:absolute;top:-40%;left:-15%;width:400px;height:400px;background:radial-gradient(circle,rgba(212,169,74,.2),transparent 70%);pointer-events:none}
.dash-hero-row{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;flex-wrap:wrap;gap:20px}
.dash-hero h1{font-size:24px;font-weight:800;margin-bottom:4px}.dash-hero p{font-size:14px;color:rgba(255,255,255,.7);max-width:500px;line-height:1.6}
.score-ring{display:flex;flex-direction:column;align-items:center;gap:4px}.score-ring svg{width:80px;height:80px;transform:rotate(-90deg)}.score-ring .bg{fill:none;stroke:rgba(255,255,255,.12);stroke-width:6}.score-ring .fg{fill:none;stroke:var(--gold);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .8s}.score-ring .val{font-size:22px;font-weight:800;fill:#fff;text-anchor:middle;dominant-baseline:central;transform:rotate(90deg);transform-origin:center}.score-label{font-size:11px;color:var(--gold);font-weight:600}

.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}@media(max-width:700px){.stat-row{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--bg-c);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;box-shadow:var(--sh)}.stat-card-label{font-size:11px;color:var(--tx-s);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}.stat-card-val{font-size:22px;font-weight:800;color:var(--navy)}.stat-card-sub{font-size:12px;color:var(--tx-m);margin-top:2px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.section-head h2{font-size:18px;font-weight:700;color:var(--navy)}.section-head .badge{font-size:12px;padding:4px 12px;background:var(--navy);color:var(--gold);border-radius:12px;font-weight:600}

/* Tabs for dashboard sections */
.dash-tabs{display:flex;gap:4px;margin-bottom:22px;background:var(--bg);border-radius:10px;padding:4px;border:1px solid var(--bd)}
.dash-tab{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;transition:.15s;color:var(--tx-m);background:transparent;border:none;font-family:inherit}
.dash-tab.active{background:var(--navy);color:var(--gold);box-shadow:0 2px 8px rgba(10,31,61,.2)}

.tasks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}@media(max-width:700px){.tasks-grid{grid-template-columns:1fr}}
.task-card{background:var(--bg-c);border:1.5px solid var(--bd);border-radius:14px;padding:20px 22px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden}
.task-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--sh-lg)}
.task-card.done{opacity:.75;border-color:var(--ok)}.task-card.done::before{content:'✓';position:absolute;top:14px;left:14px;width:28px;height:28px;background:var(--ok);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.task-card.in-progress{border-color:var(--gold)}.task-card.in-progress::before{content:'';position:absolute;top:0;right:0;left:0;height:3px;background:linear-gradient(90deg,var(--gold-d),var(--gold))}
.task-card-header{display:flex;align-items:center;gap:12px}
.task-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}.task-icon.deep{background:var(--navy);color:var(--gold)}.task-icon.simple{background:var(--bg);color:var(--tx-m);border:1px solid var(--bd)}
.task-card-title{font-size:15px;font-weight:700;color:var(--navy);line-height:1.3}.task-card-subtitle{font-size:12px;color:var(--tx-m)}
.task-card-desc{font-size:13px;color:var(--tx-m);line-height:1.55}
.task-card-footer{display:flex;gap:6px;flex-wrap:wrap;margin-top:auto}
.task-badge{font-size:10.5px;padding:3px 8px;border-radius:8px;font-weight:600}.b-hi{background:var(--err-bg);color:var(--err)}.b-md{background:var(--warn-bg);color:var(--warn)}.b-lo{background:var(--ok-bg);color:var(--ok)}.b-ref{background:rgba(10,31,61,.06);color:var(--navy)}.b-deep{background:rgba(212,169,74,.15);color:var(--gold-d)}

/* Module layout */
.mod-layout{display:grid;grid-template-columns:1fr 380px;min-height:calc(100vh - 56px)}@media(max-width:980px){.mod-layout{grid-template-columns:1fr}.mod-side{display:none}}
.mod-main{padding:32px 40px 60px}@media(max-width:600px){.mod-main{padding:20px 16px 40px}}
.mod-side{background:var(--navy);color:#fff;padding:24px 22px;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px);display:flex;flex-direction:column}
.mod-back{display:inline-flex;align-items:center;gap:6px;color:var(--tx-m);font-size:13px;font-weight:500;cursor:pointer;margin-bottom:20px;padding:6px 12px;border-radius:8px;border:1px solid var(--bd);background:transparent;transition:.15s;font-family:inherit}.mod-back:hover{color:var(--navy);border-color:var(--navy)}
.mod-title-row{display:flex;align-items:center;gap:14px;margin-bottom:8px}
.mod-title-icon{width:44px;height:44px;border-radius:12px;background:var(--navy);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mod-title{font-size:24px;font-weight:800;color:var(--navy)}.mod-subtitle{font-size:14px;color:var(--tx-m);margin-bottom:24px;line-height:1.6}
.mod-section{background:var(--bg-c);border:1px solid var(--bd);border-radius:14px;padding:24px 26px;margin-bottom:18px;box-shadow:var(--sh)}
.mod-section h3{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.mod-section p{font-size:14.5px;color:var(--tx);line-height:1.7;margin-bottom:12px}

/* Editable fields */
.edit-field{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;margin-bottom:8px;font-size:14px}
.edit-field label{font-weight:600;color:var(--tx-m);min-width:120px;font-size:13px;flex-shrink:0}
.edit-field input,.edit-field select,.edit-field textarea{flex:1;padding:6px 10px;border:1px solid var(--bd);border-radius:6px;font-family:inherit;font-size:13.5px;background:#fff;color:var(--tx)}
.edit-field textarea{min-height:50px;resize:vertical}
.edit-field input:focus,.edit-field select:focus,.edit-field textarea:focus{outline:none;border-color:var(--gold)}
.chips-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0}
.chip{padding:5px 12px;border-radius:16px;font-size:12.5px;cursor:pointer;transition:.15s;user-select:none;border:1.5px solid var(--bd);background:#fff;color:var(--tx)}.chip:hover{border-color:var(--gold);background:#FFFBF2}.chip.on{background:var(--navy);color:var(--gold);border-color:var(--navy)}.chip.sensitive.on{background:var(--gold-d);color:#fff;border-color:var(--gold-d)}
.chip.custom,.chip.custom.on{background:rgba(212,169,74,.18);border-color:var(--gold);color:var(--navy);display:inline-flex;align-items:center;gap:6px;padding-left:6px}
.chip.custom.sensitive,.chip.custom.sensitive.on{background:rgba(168,131,54,.22);border-color:var(--gold-d);color:var(--navy)}
.chip-x{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:rgba(10,31,61,.12);color:var(--navy);font-size:11px;line-height:1;cursor:pointer;border:none;padding:0;font-family:inherit;transition:.15s}.chip-x:hover{background:var(--err);color:#fff}
.custom-add-row{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
.custom-add-row input{flex:1;min-width:160px;padding:8px 12px;font-size:13px;font-family:inherit;border:1.5px solid var(--bd);border-radius:10px;background:#fff;color:var(--tx);transition:.15s}.custom-add-row input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,169,74,.12)}
.custom-add-row .btn-add{padding:8px 14px;font-size:13px;font-weight:600;background:var(--navy);color:var(--gold);border:none;border-radius:10px;cursor:pointer;font-family:inherit;transition:.15s;white-space:nowrap}.custom-add-row .btn-add:hover{background:var(--navy-l)}.custom-add-row .btn-add:disabled{opacity:.4;cursor:not-allowed}
.custom-add-row select.sens-sel{padding:8px 10px;font-size:12.5px;font-family:inherit;border:1.5px solid var(--bd);border-radius:10px;background:#fff;color:var(--tx)}
.custom-help{font-size:11.5px;color:var(--tx-s);margin-top:6px}

/* Doc preview */
.doc-preview{background:#FDFCF8;border:2px solid var(--bd);border-radius:14px;padding:28px 30px;position:relative;font-size:14px;line-height:1.8;color:var(--tx)}
.doc-preview.draft::before{content:'טיוטה - דורש אישור DPO';position:absolute;top:12px;left:12px;padding:4px 12px;background:var(--warn-bg);color:var(--warn);border-radius:8px;font-size:11px;font-weight:700}
.doc-preview h4{font-size:16px;font-weight:700;color:var(--navy);margin:18px 0 8px;padding-top:14px;border-top:1px solid var(--bd)}.doc-preview h4:first-child{border-top:none;padding-top:0;margin-top:0}
.doc-preview ul{padding-right:20px;margin:8px 0}.doc-preview li{margin-bottom:4px}

/* DPO Banner */
.dpo-banner{background:linear-gradient(135deg,#FFF7E6,#FFF2D6);border:1.5px solid var(--gold);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;margin-bottom:18px}
.dpo-banner-icon{width:38px;height:38px;background:var(--gold);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--navy);font-size:18px;flex-shrink:0}
.dpo-banner-text{flex:1}.dpo-banner-title{font-size:13px;font-weight:700;color:var(--gold-d)}.dpo-banner-desc{font-size:12.5px;color:var(--navy);margin-top:2px}
.consent-preview{background:#fff;border:2px solid var(--bd);border-radius:12px;padding:20px;margin:14px 0}
.consent-preview label{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--tx);line-height:1.55;cursor:pointer;margin-bottom:10px}
.consent-preview input[type=checkbox]{width:18px;height:18px;margin-top:2px;accent-color:var(--navy);flex-shrink:0}
.consent-preview .form-mock{padding:12px 16px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;margin-bottom:12px;font-size:13px;color:var(--tx-s)}

/* DPO Assessment zone */
.dpo-zone{background:var(--bg-c);border:2px solid var(--navy);border-radius:16px;padding:28px;margin-bottom:20px}
.dpo-zone h3{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.dpo-zone h3 span{background:var(--navy);color:var(--gold);padding:3px 10px;border-radius:6px;font-size:12px}
.dpo-q{padding:12px 16px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;display:grid;grid-template-columns:1fr 140px 120px;gap:10px;align-items:center;font-size:13.5px}
.dpo-q-text{line-height:1.5;color:var(--tx)}.dpo-q-text.auto{color:var(--ok);font-weight:600}
.dpo-q select{padding:6px 8px;border:1px solid var(--bd);border-radius:6px;font-family:inherit;font-size:12.5px;background:#fff}
.dpo-q input[type=date]{padding:5px 8px;border:1px solid var(--bd);border-radius:6px;font-family:inherit;font-size:12px}
.dpo-q.auto-filled{background:var(--ok-bg);border-color:var(--ok)}
@media(max-width:700px){.dpo-q{grid-template-columns:1fr;gap:6px}}

/* Sidebar */
.side-section{margin-bottom:20px}.side-label{font-size:10px;font-weight:600;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.side-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 16px;margin-bottom:10px}.side-card-val{font-size:15px;font-weight:700;color:#fff}.side-card-sub{font-size:11.5px;color:rgba(255,255,255,.6);margin-top:3px}
.side-link{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;background:rgba(255,255,255,.04);color:rgba(255,255,255,.7);font-size:12.5px;cursor:pointer;transition:.15s;margin-bottom:6px;text-decoration:none}.side-link:hover{background:rgba(255,255,255,.08);color:#fff}.side-link svg{width:14px;height:14px;flex-shrink:0;color:var(--gold)}
.ai-trigger{display:flex;align-items:center;gap:10px;padding:14px 16px;background:linear-gradient(135deg,rgba(212,169,74,.15),rgba(212,169,74,.05));border:1px solid rgba(212,169,74,.3);border-radius:12px;cursor:pointer;transition:.2s;margin-top:auto}
.ai-trigger:hover{background:rgba(212,169,74,.2);border-color:var(--gold)}
.ai-trigger-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;flex-shrink:0}
.ai-trigger-name{font-size:13px;font-weight:700;color:var(--gold)}.ai-trigger-desc{font-size:11px;color:rgba(255,255,255,.6)}

.btn{padding:10px 22px;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:.15s;display:inline-flex;align-items:center;gap:7px}
.btn-p{background:var(--navy);color:var(--gold)}.btn-p:hover{background:var(--navy-l);transform:translateY(-1px)}.btn-p:disabled{background:var(--bd);color:var(--tx-s);cursor:not-allowed;transform:none}
.btn-g{background:transparent;color:var(--tx-m);border:1px solid var(--bd)}.btn-g:hover{color:var(--navy);border-color:var(--navy)}
.btn-gold{background:var(--gold);color:var(--navy)}.btn-gold:hover{background:var(--gold-b)}
.btn-ok{background:var(--ok);color:#fff}.btn-sm{padding:7px 14px;font-size:12.5px;border-radius:8px}
.btn-err{background:var(--err);color:#fff;font-size:12.5px;padding:6px 12px;border-radius:7px}

/* AI Chat */
.ai-overlay{position:fixed;inset:0;background:rgba(10,31,61,.35);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(2px)}.ai-overlay.on{opacity:1;pointer-events:auto}
.ai-panel{position:fixed;top:0;left:0;width:480px;height:100vh;background:#fff;z-index:201;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .4s cubic-bezier(.25,1,.32,1);box-shadow:4px 0 30px rgba(10,31,61,.2)}.ai-panel.on{transform:translateX(0)}
@media(max-width:600px){.ai-panel{width:100%}}
.ai-hdr{background:linear-gradient(135deg,var(--navy),var(--navy-l));color:#fff;padding:18px 22px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.ai-hdr-avt{width:40px;height:40px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;flex-shrink:0}
.ai-hdr-name{font-size:15px;font-weight:700}.ai-hdr-status{font-size:11.5px;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:5px}.ai-hdr-status::before{content:'';width:6px;height:6px;border-radius:50%;background:#4ade80}
.ai-close{background:rgba(255,255,255,.1);border:none;color:#fff;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer}.ai-close:hover{background:rgba(255,255,255,.2)}
.ai-ctx{background:#FFFBF2;border-bottom:1px solid var(--bd);padding:10px 22px;font-size:12px;color:var(--gold-d);display:flex;align-items:center;gap:7px}
.ai-msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.ai-m{display:flex;gap:8px;align-items:flex-start;animation:su .3s ease}.ai-m.u{flex-direction:row-reverse}

// MULTI-CLIENT STATE
// ===================================================================
let S = { clients: {}, activeClient: null, aiMode: null, apiKey: null, route: 'home', routeParam: null, aiCtx: null, aiHist: {} };

function load() {
  try { const d = JSON.parse(localStorage.getItem('databee_v4') || '{}'); Object.assign(S, d); } catch(e) {}
  // Migration: ensure custom-text fields exist on all existing clients
  if (S.clients) {
    Object.values(S.clients).forEach(c => {
      if (c && c.db) {
        if (!Array.isArray(c.db.customSubjectCategories)) c.db.customSubjectCategories = [];
        if (!Array.isArray(c.db.customPurpose)) c.db.customPurpose = [];
        if (!Array.isArray(c.db.customCollectionMethods)) c.db.customCollectionMethods = [];
        if (!Array.isArray(c.db.customDataTypes)) c.db.customDataTypes = [];
        if (!Array.isArray(c.db.customSensitiveDataTypes)) c.db.customSensitiveDataTypes = [];
      }
    });
  }
}
function save() {
  try { localStorage.setItem('databee_v4', JSON.stringify(S)); } catch(e) {}
}
function C() { return S.activeClient ? S.clients[S.activeClient] : null; } // active client shorthand

function newClient(name, type) {
  const id = 'c_' + Date.now();
  S.clients[id] = {
    id, name, type: type || 'nonprofit',
    db: { name: '', subjectCategories: [], customSubjectCategories: [], purpose: [], customPurpose: [], collectionMethods: [], customCollectionMethods: [], subjectsCount: 0, permissionsCount: 0, dataTypes: [], sensitiveTypes: [], customDataTypes: [], customSensitiveDataTypes: [], transferAbroad: null, vendors: [], managerName: '', managerRole: '', managerEmail: '', securityLevel: '' },
    tasks: {},
    dpoAssessment: {},
  };
  S.activeClient = id;
  save();
  return id;
}

function deleteClient(id) { delete S.clients[id]; if (S.activeClient === id) S.activeClient = null; save(); }

function calcSecurity(db) {
  const customSens = (db.customSensitiveDataTypes && db.customSensitiveDataTypes.length) || 0;
  const builtSens = (db.sensitiveTypes && db.sensitiveTypes.length) || 0;
  const hs = (builtSens + customSens) > 0;
  const sc = db.subjectsCount || 0; const pc = db.permissionsCount || 0;
  if (hs && (sc >= 100000 || pc > 100)) return 'high';
  if (hs) { if (pc <= 10) return 'basic'; return 'medium'; }
  return 'basic';
}

function secLabel(l) { return l === 'high' ? 'גבוהה' : l === 'medium' ? 'בינונית' : 'בסיסית'; }

// ===================================================================
// ROUTER & RENDER
// ===================================================================
function navigate(route, param) {
  S.route = route; S.routeParam = param || null;
  render(); window.scrollTo(0, 0); updateNav();
}

function updateNav() {
  const nav = document.getElementById('navLinks');
  if (!S.activeClient) { nav.innerHTML = ''; return; }
  nav.innerHTML = `<a class="${S.route==='dashboard'?'active':''}" onclick="navigate('dashboard')">דשבורד</a><a class="${S.route==='dpo_zone'?'active':''}" onclick="navigate('dpo_zone')">שגרת DPO</a>`;
  updateClientBtn();
}

function updateClientBtn() {
  const c = C();
  document.getElementById('cAvt').textContent = c ? c.name.charAt(0) : '+';
  document.getElementById('cName').textContent = c ? c.name : 'בחר / הוסף לקוח';
}

function toggleDD() {
  const dd = document.getElementById('clientDD');
  dd.classList.toggle('open');
  renderClientDD();
}

function renderClientDD() {
  const dd = document.getElementById('clientDD');
  const ids = Object.keys(S.clients);
  dd.innerHTML = ids.map(id => {
    const c = S.clients[id];
    return `<div class="client-dd-item ${S.activeClient===id?'active':''}" onclick="selectClient('${id}')"><div class="avt">${c.name.charAt(0)}</div><div style="flex:1"><div style="font-weight:600">${c.name}</div><div style="font-size:11px;color:var(--tx-s)">${c.type==='nonprofit'?'עמותה':c.type==='company'?'חברה':'גוף ציבורי'}</div></div>${S.activeClient===id?'<span style="color:var(--gold);font-size:11px;font-weight:700">פעיל</span>':''}</div>`;
  }).join('') + `<div class="client-dd-add" onclick="navigate('new_client')">➕ הוסף לקוח חדש</div>`;
}

function selectClient(id) {
  S.activeClient = id; save();
  document.getElementById('clientDD').classList.remove('open');
  navigate('dashboard');
}

function render() {
  const app = document.getElementById('app');
  const r = S.route;
  if (!S.activeClient && r !== 'new_client') { renderHome(app); return; }
  if (r === 'home') { renderHome(app); return; }
  if (r === 'new_client') { renderNewClient(app); return; }
  if (r === 'dashboard') { renderDashboard(app); return; }
  if (r === 'dpo_zone') { renderDpoZone(app); return; }
  if (r === 'edit_db') { renderEditDb(app); return; }
  // Module
  renderModule(app, r);
}

function updDb(key, val) { const c=C(); if(!c) return; c.db[key]=val; c.db.securityLevel=calcSecurity(c.db); save(); }
function togChip(field, val) { const c=C(); if(!c) return; const arr=c.db[field]; const i=arr.indexOf(val); if(i===-1) arr.push(val); else arr.splice(i,1); save(); render(); }
function togDataType(val, isSensitive) {
  const c=C(); if(!c) return;
  const dt=c.db.dataTypes; const st=c.db.sensitiveTypes;
  const i=dt.indexOf(val); if(i===-1){dt.push(val);if(isSensitive)st.push(val);} else{dt.splice(i,1);const si=st.indexOf(val);if(si!==-1)st.splice(si,1);}
  c.db.securityLevel=calcSecurity(c.db); save(); render();
}
function vendorRow(i,v) { return `<div class="edit-field"><label>ספק ${i+1}</label><input value="${v.name}" onchange="updVendor(${i},'name',this.value)" placeholder="שם" style="flex:1"><input value="${v.activity}" onchange="updVendor(${i},'activity',this.value)" placeholder="פעילות" style="flex:1"><button class="btn-err btn" style="padding:4px 8px" onclick="rmVendor(${i})">✕</button></div>`; }
function addVendor() { const c=C(); if(!c) return; c.db.vendors.push({name:'',activity:''}); save(); render(); }
function updVendor(i,k,v) { const c=C(); if(!c) return; c.db.vendors[i][k]=v; save(); }
function rmVendor(i) { const c=C(); if(!c) return; c.db.vendors.splice(i,1); save(); render(); }

// HTML escape for user-entered free text
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// Add a custom (free-text) item to a category list. inputId = id of the input element.
function addCustom(field, inputId) {
  const c=C(); if(!c) return;
  const el=document.getElementById(inputId); if(!el) return;
  const v=el.value.trim(); if(!v) return;
  if(v.length>80){alert('עד 80 תווים');return;}
  if(!Array.isArray(c.db[field])) c.db[field]=[];
  // prevent duplicates (case-insensitive)
  const exists=c.db[field].some(x=>x.toLowerCase()===v.toLowerCase());
  if(exists){el.value='';return;}
  c.db[field].push(v);
  save(); render();
}
function rmCustom(field, idx) {
  const c=C(); if(!c) return;
  if(!Array.isArray(c.db[field])) return;
  c.db[field].splice(idx,1);
  save(); render();
}

// Custom data type with sensitivity flag
function addCustomDataType() {
  const c=C(); if(!c) return;
  const el=document.getElementById('add-dt'); if(!el) return;
  const v=el.value.trim(); if(!v) return;
  if(v.length>80){alert('עד 80 תווים');return;}
  const isSens=document.getElementById('add-dt-sens').value==='true';
  const target=isSens?'customSensitiveDataTypes':'customDataTypes';
  if(!Array.isArray(c.db[target])) c.db[target]=[];
  // prevent duplicates across both lists
  const all=[...(c.db.customDataTypes||[]),...(c.db.customSensitiveDataTypes||[])];
  if(all.some(x=>x.toLowerCase()===v.toLowerCase())){el.value='';return;}
  c.db[target].push(v);
  c.db.securityLevel=calcSecurity(c.db); save(); render();
}
function rmCustomDataType(isSens, idx) {
  const c=C(); if(!c) return;
  const target=isSens?'customSensitiveDataTypes':'customDataTypes';
  if(!Array.isArray(c.db[target])) return;
  c.db[target].splice(idx,1);
  c.db.securityLevel=calcSecurity(c.db); save(); render();
}

        <h3>${sheetLabels[sheetId]||sheetId} <span>${sheetId}</span> ${task ? `<button class="btn btn-g btn-sm" style="margin-right:auto" onclick="navigate('${task.id}')">פתח מודול →</button>` : ''}</h3>
        ${questions.map((q, qi) => {
          const qKey = `${sheetId}_${qi}`;
          const autoFilled = taskDone;
          const val = c.dpoAssessment[qKey] || (autoFilled ? 'done' : '');
          return `<div class="dpo-q ${autoFilled?'auto-filled':''}">
            <div class="dpo-q-text ${autoFilled?'auto':''}">
              ${autoFilled?'✅ ':''}${q}
            </div>
            <select onchange="updDpo('${qKey}',this.value)" ${autoFilled?'disabled':''}>
              <option value="" ${!val?'selected':''}>—</option>
              <option value="done" ${val==='done'?'selected':''}>✅ בוצע</option>
              <option value="partial" ${val==='partial'?'selected':''}>⚠️ חלקי</option>
              <option value="no" ${val==='no'?'selected':''}>❌ לא</option>
              <option value="na" ${val==='na'?'selected':''}>לא רלוונטי</option>
            </select>
            <input type="date" value="${c.dpoAssessment[qKey+'_date']||''}" onchange="updDpo('${qKey}_date',this.value)" placeholder="תאריך">
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  </div>`;
}

function updDpo(key, val) { const c=C(); if(!c) return; c.dpoAssessment[key]=val; save(); }

// ===================================================================
function renderModule(app, moduleId) {
  const c = C(); if(!c) { renderHome(app); return; }
  const task = TASKS.find(t=>t.id===moduleId);
  if(!task) { renderDashboard(app); return; }
  if(!c.tasks[moduleId]||c.tasks[moduleId]==='open') { c.tasks[moduleId]='in-progress'; save(); }

  // Deep modules
  if(moduleId==='db_definition') { navigate('edit_db'); return; }
  if(moduleId==='privacy_policy') { renderPrivacyPolicy(app,task); return; }
  if(moduleId==='consent_mechanism') { renderConsent(app,task); return; }
  if(moduleId==='dpa_vendors') { renderDpa(app,task); return; }
  if(moduleId==='data_minimization') { renderMinimization(app,task); return; }

  // Simple modules
  renderSimple(app, task);
}

function markDone(id) { const c=C(); if(!c) return; c.tasks[id]='done'; save(); }
function markOpen(id) { const c=C(); if(!c) return; c.tasks[id]='open'; save(); render(); }

    ${(db.customSensitiveDataTypes||[]).map(t=>`<div style="display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--warn-bg);border:1px solid var(--warn);border-radius:10px;margin-bottom:8px">
      <div style="flex:1;font-weight:600">${esc(t)} ⚠ רגיש <span style="font-size:11px;color:var(--gold-d);font-weight:500">(הוגדר ידנית)</span></div>
      <select style="padding:6px;border:1px solid var(--bd);border-radius:6px;font-family:inherit;font-size:12px"><option>✅ נדרש</option><option>⚠️ לבחון</option><option>❌ עודף</option></select></div>`).join('')}
    </div>
    <div class="mod-section"><h3>📅 תיעוד בחינה שנתית</h3>
      <div class="edit-field"><label>תאריך</label><input type="date" value="${new Date().toISOString().split('T')[0]}"></div>
      <div class="edit-field"><label>מבצע</label><input placeholder="${db.managerName||'שם'}"></div>
      <div class="edit-field"><label>מסקנות</label><textarea placeholder="אילו סוגי מידע עודפים? מה נמחק?"></textarea></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn btn-p" onclick="markDone('data_minimization');navigate('dashboard')">תעד וסיים</button>
      <button class="btn btn-g" onclick="navigate('edit_db')">ערוך נתונים</button>
    </div>
  </div>${sidebar(task)}</div>`;
}

// ===================================================================
// SIDEBAR (shared)
// ===================================================================
function sidebar(task) {
  const c=C(); const db=c?c.db:{};
  return `<div class="mod-side">
    <div class="side-section"><div class="side-label">פרטי מאגר</div>
      <div class="side-card"><div class="side-card-val">${db.name||'טרם הוגדר'}</div><div class="side-card-sub">${(db.subjectsCount||0).toLocaleString()} נושאי מידע · ${db.permissionsCount||0} מורשים</div></div>
      <div class="side-card"><div class="side-card-val" style="color:var(--gold)">רמה ${secLabel(calcSecurity(db))}</div><div class="side-card-sub">רגיש: ${((db.sensitiveTypes&&db.sensitiveTypes.length)||(db.customSensitiveDataTypes&&db.customSensitiveDataTypes.length))?'כן':'לא'}</div></div>
    </div>
    <div class="side-section"><div class="side-label">מסמכים רשמיים</div>
      <a class="side-link" href="https://www.gov.il/BlobFolder/guide/data_security_guide/he/NEW_GUIDE.pdf" target="_blank"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>מדריך תקנות אבטחת מידע</a>
      <a class="side-link" href="https://www.nevo.co.il/law_html/law00/71631.htm" target="_blank"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>חוק הגנת הפרטיות</a>
    </div>
    <div class="ai-trigger" onclick="openAI('${task.id}')"><div class="ai-trigger-avatar">ע</div><div><div class="ai-trigger-name">שאל את עמית</div><div class="ai-trigger-desc">שאלות על ${task.title}</div></div></div>
  </div>`;
}

// ===================================================================
// AI CHAT
// ===================================================================
const AI_SUGS = {
  privacy_policy:['מה חייב להיות במדיניות?','איך מנסחים סעיף זכויות?'],
  consent_mechanism:['האם מותר לסמן צ\'קבוקס מראש?','מה ההבדל בין opt-in ל-opt-out?'],
  dpa_vendors:['מה חייב בהסכם DPA?','Google - יש DPA סטנדרטי?'],
  data_minimization:['כל כמה בוחנים מידע עודף?','מה הסנקציה?'],
  dsr_mechanism:['כמה זמן למענה?','חייבים אימות זהות?'],
  default:['מה הסנקציות על אי-עמידה?','מה תיקון 13?'],
};
const AI_DEMO_RESP = {
  privacy_policy:'מדיניות פרטיות חייבת לכלול לפי סעיף 11: **מטרות**, **סוגי מידע**, **למי מועבר**, **זכויות** (עיון, תיקון, מחיקה), **פרטי קשר** מנהל המאגר.',
  consent_mechanism:'לפי סעיפים 11-12, ההסכמה חייבת להיות **מדעת**. אסור לסמן צ\'קבוקס מראש. לדיוור - **הסכמה נפרדת**.',
  dpa_vendors:'DPA לפי תקנה 15: **(1)** מידע שיעובד **(2)** מטרות **(3)** משך **(4)** השבת מידע **(5)** סודיות **(6)** אבטחה **(7)** דיווח שנתי.',
  data_minimization:'תקנה 2(ג) = בדיקה שנתית. הרשות ממליצה **גם בתדירות גבוהה יותר** למידע רגיש. הפרה = סנקציות + תביעות.',
  default:'אני עמית, יועץ הפרטיות הדיגיטלי. שאל אותי כל שאלה על חוק הגנת הפרטיות, תקנות אבטחת מידע, תיקון 13, צמצום מידע, או דיוור ישיר.',
};

function openAI(ctx) {
  if(!S.aiMode){document.getElementById('apiModal').classList.add('on');window._pAI=ctx;return;}
  S.aiCtx=ctx;
  const task=TASKS.find(t=>t.id===ctx);
  document.getElementById('aiCtxText').textContent=task?`הקשר: ${task.title}`:'הקשר כללי';
  if(!S.aiHist[ctx]) S.aiHist[ctx]=[{role:'bot',content:`היי! שאל אותי על **${task?task.title:'הגנת פרטיות'}**.`}];
  rAIMsgs(); rAISugs(ctx);
  document.getElementById('aiPanel').classList.add('on');
  document.getElementById('aiOverlay').classList.add('on');
  setTimeout(()=>document.getElementById('aiIn').focus(),300);
}
function closeAI(){document.getElementById('aiPanel').classList.remove('on');document.getElementById('aiOverlay').classList.remove('on');}

function rAIMsgs(){
  const h=S.aiHist[S.aiCtx]||[];
  document.getElementById('aiMsgs').innerHTML=h.map(m=>`<div class="ai-m ${m.role==='user'?'u':'b'}"><div class="ai-m-avt ${m.role==='user'?'u':'b'}">${m.role==='user'?'א':'ע'}</div><div class="ai-m-bub">${m.content.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div></div>`).join('');
  const el=document.getElementById('aiMsgs');el.scrollTop=el.scrollHeight;
}
function rAISugs(ctx){const s=AI_SUGS[ctx]||AI_SUGS.default;document.getElementById('aiSugs').innerHTML=s.map(x=>`<button class="ai-sug" onclick="uAISug('${x.replace(/'/g,"\\'")}')">${x}</button>`).join('');}
function uAISug(t){document.getElementById('aiIn').value=t;sendAI();}

const aiInEl=document.getElementById('aiIn');
const aiSendEl=document.getElementById('aiSendBtn');
aiInEl.addEventListener('input',()=>{aiSendEl.disabled=!aiInEl.value.trim();aiInEl.style.height='auto';aiInEl.style.height=Math.min(aiInEl.scrollHeight,100)+'px';});
aiInEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey&&aiInEl.value.trim()){e.preventDefault();sendAI();}});

async function sendAI(){
  const t=aiInEl.value.trim();if(!t)return;
  S.aiHist[S.aiCtx].push({role:'user',content:t});rAIMsgs();
  document.getElementById('aiSugs').innerHTML='';
  aiInEl.value='';aiInEl.style.height='auto';aiSendEl.disabled=true;
  const ty=document.createElement('div');ty.className='ai-m b';ty.id='ai-ty';ty.innerHTML=`<div class="ai-m-avt b">ע</div><div class="typing"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
  document.getElementById('aiMsgs').appendChild(ty);
  let r;
  try{
    if(S.aiMode==='real'&&S.apiKey){
      const c=C();const task=TASKS.find(x=>x.id===S.aiCtx);
      const sys=`אתה "עמית" - יועץ פרטיות דיגיטלי של DataBee. ענה בעברית, קצר, השתמש ב-**מודגש**. הפנה לסעיפי חוק. הקשר: ${task?task.title:'כללי'}. ארגון: ${c?c.name:''}. מאגר: ${c?c.db.name:''}. רמת אבטחה: ${c?secLabel(calcSecurity(c.db)):''}`;
      const msgs=S.aiHist[S.aiCtx].slice(0,-1).map(m=>({role:m.role==='bot'?'assistant':'user',content:m.content})).concat([{role:'user',content:t}]);
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-5-20250929',max_tokens:800,system:sys,messages:msgs})});
      if(!res.ok)throw new Error(await res.text());
      const d=await res.json();r=d.content?.[0]?.text||'לא הצלחתי.';
    }else{await new Promise(x=>setTimeout(x,800));r=(AI_DEMO_RESP[S.aiCtx]||AI_DEMO_RESP.default)+'\n\n*(מצב דמו)*';}
  }catch(e){r='שגיאה. נסה שוב.';console.error(e);}
  document.getElementById('ai-ty')?.remove();
  S.aiHist[S.aiCtx].push({role:'bot',content:r});rAIMsgs();
}

function saveApiKey(){const k=document.getElementById('apiKeyIn').value.trim();if(!k.startsWith('sk-ant-')){alert('צריך sk-ant-...');return;}S.apiKey=k;S.aiMode='real';save();document.getElementById('apiModal').classList.remove('on');if(window._pAI){openAI(window._pAI);window._pAI=null;}}
function useDemoMode(){S.aiMode='demo';save();document.getElementById('apiModal').classList.remove('on');if(window._pAI){openAI(window._pAI);window._pAI=null;}}

// ===================================================================
// INIT
// ===================================================================
load();
render();

</script>
